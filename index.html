<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Drag&Drop</title>
</head>
<body>
<script>
    function allowDrop(ev) {
        ev.preventDefault();
    }

    function drag(ev) {
    ev.dataTransfer.setData("text", ev.target.id);
    }

   
    function drop(ev) {
    ev.preventDefault();
    var data = ev.dataTransfer.getData("text");
    ev.target.appendChild(document.getElementById(data));
    }
</script>
    <!-- <label for="file">Add file here</label>
    <input type="file" name="" id="fileInput" ondrop="drop(event)" ondragover="allowDrop(event)" multiple> -->
    <div id="sq1" class="def" ondrop="drop(event)" ondragover="allowDrop(event)" >
        <div id="drag1" class="dragitem" draggable="true" ondragstart="drag(event)">
            
        </div>
    </div>
    <div id="sq2" class="def" ondrop="drop(event)" ondragover="allowDrop(event)">

    </div>
</body>
</html>
